<style>
*{box-sizing:border-box}
html,body{margin:0;min-height:100%;background:#061326;color:#fff;font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",Arial,sans-serif}
button{font-family:inherit;cursor:pointer;touch-action:manipulation;-webkit-tap-highlight-color:rgba(255,210,26,.25)}
.app{min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:18px}
.title{font-size:clamp(48px,13vw,116px);font-weight:1000;line-height:.94;letter-spacing:.03em;color:#ffd21a;text-shadow:0 4px 0 rgba(0,0,0,.25)}
.subtitle{font-size:clamp(18px,4vw,28px);font-weight:900;margin:18px 0 8px}
.small{font-size:13px;color:#cbd5e1;margin:8px}
.modeTabs{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin:16px auto}
.modeBtn{border:1px solid rgba(255,210,26,.5);border-radius:16px;background:rgba(255,255,255,.08);color:#fff;padding:14px 18px;font-size:18px;font-weight:1000}
.modeBtn.active{background:#ffd21a;color:#061326}
.sectionGrid{display:grid;grid-template-columns:repeat(2,minmax(130px,1fr));gap:10px;width:min(780px,96vw);max-height:45vh;overflow:auto;margin:12px auto;padding:4px}
.secBtn{border:1px solid rgba(255,210,26,.35);border-radius:12px;background:rgba(255,255,255,.09);color:#fff;padding:12px 6px;font-size:15px;font-weight:850}
.secBtn.quickGroupA{background:rgba(255,255,255,.09)}
.secBtn.quickGroupB{background:rgba(90,135,185,.40);border-color:rgba(170,205,240,.60)}
.secBtn.selected{background:#ffd21a;color:#061326;border-color:#ffd21a}
.secBtn.done{background:#FFD21A;color:#061326;border-color:#FFD21A}
.secBtn.master{background:#FFD21A;color:#061326;border-color:#FFD21A;box-shadow:0 0 16px rgba(255,210,26,.55)}
.secBtn.grand{background:#FFD21A;color:#061326;border-color:#FFD21A;box-shadow:0 0 22px rgba(255,210,26,.85), inset 0 0 0 2px #fff}
.progressBox{margin:12px auto 0;color:#dbe4ef;font-size:15px;font-weight:900}
.resetBtn{border:1px solid rgba(255,255,255,.25);background:#1f2937;color:#fff;border-radius:14px;padding:10px 14px;font-size:13px;font-weight:900;margin-top:8px}
.win{min-height:100vh;width:100vw;display:flex;align-items:center;justify-content:center;text-align:center;padding:16px;background:radial-gradient(circle at center,#1d2b45 0%,#061326 55%,#020814 100%);overflow:hidden;position:relative}
.confetti{position:absolute;inset:0;background-image:radial-gradient(#ffd21a 2px,transparent 3px),radial-gradient(#fff 1px,transparent 2px);background-size:42px 42px,65px 65px;animation:spark 1.2s linear infinite;opacity:.9}
@keyframes spark{from{transform:translateY(-20px)}to{transform:translateY(20px)}}
.winBox{position:relative;z-index:2;width:min(980px,96vw)}
.perfect{color:#ffd21a;font-size:clamp(28px,6vw,58px);font-weight:1000}

.ribbon{display:inline-block;background:#ffd21a;color:#061326;border-radius:999px;padding:10px 24px;font-size:clamp(18px,4vw,34px);font-weight:1000;margin:18px 0}
.winScore{border:2px solid #ffd21a;border-radius:22px;padding:18px;margin:14px auto;width:min(520px,90vw);box-shadow:0 0 22px rgba(255,210,26,.45)}
.big100{font-size:clamp(70px,16vw,132px);font-weight:1000;color:#ffd21a}

.topbar{position:fixed;top:12px;left:16px;right:16px;display:flex;justify-content:space-between;font-size:16px;font-weight:900;z-index:5}
.vol{color:#ffd21a} .count{color:#fff}
.card{width:min(860px,92vw);min-height:40vh;border-radius:22px;background:#eef3ec;color:#061326;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px 18px;box-shadow:0 12px 38px rgba(0,0,0,.38)}

.answerText{font-size:clamp(36px,9vw,86px);font-weight:1000;color:#ffd21a;line-height:1.2;margin:16px 0;text-shadow:0 3px 0 rgba(0,0,0,.18)}

.judge{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:24px}
.ok,.ng,.menuBtn,.tryBtn{border:0;border-radius:16px;padding:16px 20px;color:#fff;font-size:19px;font-weight:1000}

.breakTitle.last{color:#ff4faf;font-size:clamp(54px,14vw,84px)}
.breakMsg{font-size:24px;font-weight:1000;margin-bottom:6px}
.breakSub{color:#aab5c3;font-size:18px;margin-bottom:12px}

.score{text-align:center;font-size:52px;font-weight:1000;margin:10px}

function jsonpRequest(params,callback){
  if(!CLOUD_ENABLED){callback(null);return}
  const cbName="HARUZZY_CB_"+Date.now()+"_"+Math.floor(Math.random()*100000);
  const script=document.createElement("script");
  let done=false;
  function finish(data){
    if(done)return;
    done=true;
    try{delete window[cbName]}catch(e){}
    if(script.parentNode)script.parentNode.removeChild(script);
    callback(data);
  }
  window[cbName]=function(data){finish(data)};
  script.onerror=function(){finish(null)};
  const query=new URLSearchParams(Object.assign({},params,{callback:cbName,t:String(Date.now())}));
  script.src=HARUZZY_API_URL+"?"+query.toString();
  document.head.appendChild(script);
  setTimeout(function(){finish(null)},10000);
}

    }else{
      cloudLoaded=false;
      cloudMessage="☁️ 3台共有：未接続";
    }
    menu();
  });
}
function saveCloudStat(mode,start,end,st){
  if(!CLOUD_ENABLED)return;
  jsonpRequest({
    action:"save",
    mode:mode,
    vol:pad(start)+"_"+pad(end),
    perfects:String(Number(st.perfects||0)),
    attempts:String(Number(st.attempts||0))
  },function(res){
    cloudMessage=(res&&res.ok)?"☁️ 3台共有：保存済み":"☁️ 3台共有：保存保留";
    menu();
  });
}
function markComplete(){
  if(isTryAgain)return;
  const key=volKey();
  const all=loadStats();
  const st=all[key]||{perfects:0,attempts:0};
  st.attempts=(st.attempts||0)+1;
  st.perfects=(st.perfects||0)+1;
  all[key]=st;
  saveLocalStats(all);
  cloudStats[key]=st;
  saveCloudStat(selectedMode,selectedStart,selectedEnd,st);
}
function resetData(){
  if(confirm("この端末の表示データをリセットしますか？\n共有データは削除しません。")){
    localStorage.removeItem("HARUZZY_STATS_V4");
    cloudStats={};
    cloudLoaded=false;
    cloudMessage=CLOUD_ENABLED?"☁️ 再読込中...":"☁️ 公開版で3台共有";
    menu();
    loadCloudStats();
  }
}
function statusClass(st){
  if((st.perfects||0)>=3)return " grand";
  if((st.perfects||0)>=2)return " master";
  if((st.perfects||0)>=1)return " done";
  return "";
}
function statusLabel(st){
  if((st.perfects||0)>=3)return " 👑";
  if((st.perfects||0)>=2)return " ⭐";
  if((st.perfects||0)>=1)return " ✅";
  return "";
}
function progressOne(modeName){
  const step=modeName==="standard"?100:20;
  const total=Math.ceil(1700/step);
  const s=loadStats();
  let done=0, master=0, grand=0;
  for(let start=1;start<=1700;start+=step){
    const end=Math.min(start+step-1,1700);
    const st=s[modeName+"_"+pad(start)+"_"+pad(end)]||{perfects:0};
    if((st.perfects||0)>=1)done++;
    if((st.perfects||0)>=2)master++;
    if((st.perfects||0)>=3)grand++;
  }
  const pct=Math.round(done/total*100);
  return {done,total,pct,master,grand};
}
function progressSummary(){
  const q=progressOne("quick");
  const st=progressOne("standard");
  return `⚡ QUICK　${q.done}/${q.total} Vol　${q.pct}%　⭐${q.master}　👑${q.grand}<br>📚 STANDARD　${st.done}/${st.total} Vol　${st.pct}%　⭐${st.master}　👑${st.grand}`;
}
function speak(text){if(!("speechSynthesis" in window))return;speechSynthesis.cancel();let u=new SpeechSynthesisUtterance(text);u.lang="en-US";u.rate=.82;speechSynthesis.speak(u)}
function tone(f,type,dur,vol,delay=0){try{let c=window.__ctx||new(window.AudioContext||window.webkitAudioContext)();window.__ctx=c;let o=c.createOscillator(),g=c.createGain();o.type=type;o.frequency.value=f;o.connect(g);g.connect(c.destination);let t=c.currentTime+delay;g.gain.setValueAtTime(.0001,t);g.gain.linearRampToValueAtTime(vol,t+.01);g.gain.exponentialRampToValueAtTime(.0001,t+dur);o.start(t);o.stop(t+dur+.03)}catch(e){}}
function playClick(){tone(920,"square",.055,.13);tone(1220,"triangle",.06,.08,.045)}
function playCorrect(){tone(880,"triangle",.11,.16);tone(1320,"triangle",.14,.15,.09)}
function playWrong(){tone(300,"sawtooth",.12,.12);tone(180,"sawtooth",.14,.11,.10)}
function playBreak(long){tone(660,"sine",.18,.13);tone(990,"sine",.20,.11,.15);if(long)tone(1320,"sine",.26,.10,.34)}

function menu(){
  const step=selectedMode==="standard"?100:20;
  let buttons="";
  for(let s=1;s<=1700;s+=step){
    let e=Math.min(s+step-1,1700);
    let st=getStats(selectedMode+"_"+pad(s)+"_"+pad(e));
    let quickGroup="";
    if(selectedMode==="quick"){
      const groupIndex=Math.floor((s-1)/100);
      quickGroup=groupIndex%2===0?" quickGroupA":" quickGroupB";
    }
    let cls=(s===selectedStart?"secBtn selected":"secBtn")+quickGroup+statusClass(st);
    buttons += `<button class="${cls}" data-action="vol" data-s="${s}" data-e="${e}">vol.${pad(s)}-${pad(e)}${statusLabel(st)}</button>`;
  }
  root.className="app";
  root.innerHTML=`<div>
    <div class="title">HARUZZY<br>FLASH CARD</div>
    <div class="subtitle">モードを選択</div>
    <div class="modeTabs">
      <button class="modeBtn ${selectedMode==="standard"?"active":""}" data-action="mode" data-mode="standard">📚 STANDARD<br><span class="small">100問</span></button>
      <button class="modeBtn ${selectedMode==="quick"?"active":""}" data-action="mode" data-mode="quick">⚡ QUICK<br><span class="small">20問</span></button>
    </div>
    <div class="sectionGrid">${buttons}</div>
    <button class="startBtn" data-action="start">START</button>
    <div class="progressBox">${progressSummary()}</div>
    <div class="small">✅ COMPLETE / ⭐ MASTER / 👑 GRAND MASTER（QUICK・STANDARD別管理）<br>${cloudMessage}</div>
    <button class="resetBtn" data-action="reset">RESET DATA</button>
    <div class="small">選択中：${volName()} / 毎回ランダム出題</div>
  </div>`;

  const grid=root.querySelector(".sectionGrid");
  if(grid){
    grid.scrollTop=menuScrollTop;
    grid.addEventListener("scroll",function(){
      menuScrollTop=grid.scrollTop;
    },{passive:true});
  }
}
function changeMode(m){
  selectedMode=m;
  selectedStart=1;
  selectedEnd=m==="standard"?100:20;
  menuScrollTop=0;
  menu();
}
function selectVol(s,e){
  const grid=root.querySelector(".sectionGrid");
  if(grid)menuScrollTop=grid.scrollTop;
  selectedStart=s;
  selectedEnd=e;
  menu();
}
function startGame(){isTryAgain=false;cards=shuffle(allCards.filter(c=>c.no>=selectedStart&&c.no<=selectedEnd));index=0;correct=0;wrong=[];breakShown={30:false,60:false,90:false};showQuestion()}
function startTryAgain(){isTryAgain=true;cards=shuffle([...missedSource]);index=0;correct=0;wrong=[];breakShown={30:true,60:true,90:true};showQuestion()}
function topbar(){return `<div class="topbar"><div class="vol">${isTryAgain?"TRY AGAIN":volName()}</div><div class="count">${Math.min(index+1,cards.length)} / ${cards.length}</div></div>`}

function showQuestion(){
  if(index>=cards.length){showResult();return}
  if(!isTryAgain && selectedMode==="standard" && cards.length>=100){
    if(index===30&&!breakShown[30]){showBreak(30);return}
    if(index===60&&!breakShown[60]){showBreak(60);return}
    if(index===90&&!breakShown[90]){showBreak(90);return}
  }
  mode=Math.random()<.5?"EN_TO_JA":"JA_TO_EN";
  const c=cards[index], q=mode==="EN_TO_JA"?c.word:c.meaning;
  root.className="app";
  root.innerHTML=topbar()+`<div>
    <div class="card">
      <div class="badge">${mode==="EN_TO_JA"?"英語 → 日本語":"日本語 → 英語"}</div>
      <div class="qword">${esc(q)}</div>
      ${mode==="EN_TO_JA"?`<button class="speaker" data-action="speak">🔊</button>`:""}
    </div>
    <button class="bigAction" data-action="answer">答えを見る</button>
    <div class="hint">PCはEnter / iPhoneは「答えを見る」</div>
  </div>`;
}
function showAnswer(){
  playClick();
  const c=cards[index], a=mode==="EN_TO_JA"?c.meaning:c.word;
  root.className="app";
  root.innerHTML=topbar()+`<div>
    <div class="badge">答え</div>
    <div class="answerText">${esc(a)}</div>
    <button class="speaker" data-action="speak">🔊</button>
    <div class="judge">
      <button class="ok" data-action="ok">○ わかった</button>
      <button class="ng" data-action="ng">× わからなかった</button>
    </div>
    <div class="hint">採点すると次の問題へ進みます</div>
  </div>`;
}
function mark(ok){
  if(index>=cards.length)return;

  if(ok){
    correct++;
    playCorrect();
  }else{
    wrong.push(cards[index]);
    playWrong();
  }

  index++;

  if(index>=cards.length){
    showResult();
    return;
  }

  setTimeout(function(){
    showQuestion();
  },120);
}
function showBreak(n){
  breakShown[n]=true; const last=n===90; playBreak(last);
  const title=last?"LAST 10 !":"SHORT BREAK";
  const msg=n===30?"Take a short break!":n===60?"Keep going!<br><span style='color:#58a6ff'>You're doing great!</span>":"Only 10 questions left!";
  const sub=n===30?"少し休憩しよう！":n===60?"いいペースだよ！":"あと10問！ラストスパート！";
  const img=ghostSrc?`<img class="breakGhost" src="${ghostSrc}" alt="">`:"";
  root.className="app";
  root.innerHTML=`<div class="breakCard">
    <div class="breakProgress">${n} / 100</div>
    <div class="breakBar"><span style="width:${n}%"></span></div>
    <div class="breakTitle ${last?"last":""}">${title}</div>
    <div class="breakMsg">${msg}</div>
    <div class="breakSub">${sub}</div>
    <div style="height:110px;display:flex;align-items:center;justify-content:center">${img}</div>
    <button class="breakNext" data-action="next">NEXT</button>
  </div>`;
}
function showWin(){
  markComplete();
  root.className="win";
  root.innerHTML=`<div class="confetti"></div><div class="winBox">
    <div class="perfect">★★★ PERFECT SCORE! ★★★</div>
    <div class="nowwin">NOW WIN!</div>
    <div class="ribbon">You did it! ${cards.length} out of ${cards.length}!</div>
    <div class="winScore"><span class="big100">${cards.length}</span> / ${cards.length}<br><b>正答率 100%</b></div>
    <div class="small">このVolをCOMPLETEに記録しました</div>
    <div class="judge">
      <button class="startBtn" style="font-size:26px;padding:15px 30px" data-action="restart">同じVolをもう一度</button>
      <button class="menuBtn" data-action="menu">トップに戻る</button>
    </div>
  </div>`;
}
function showResult(){
  missedSource=[...wrong];
  const total=cards.length, rate=total?Math.round(correct/total*100):0;
  if(correct===total && total>0 && !isTryAgain){
    showWin();
    return;
  }
  let miss=wrong.length?wrong.map(c=>`<div class="miss">${c.no}　<b>${esc(c.word)}</b>　${esc(c.meaning)} <button data-action="speakword" data-word="${esc(c.word)}" style="border:0;border-radius:8px;background:#ffd21a;padding:4px 8px">🔊</button></div>`).join(""):`<div class="miss">間違いなし。完璧。</div>`;
  root.className="app";
  root.innerHTML=`<div class="result">
    <div class="vol">${isTryAgain?"TRY AGAIN":volName()}</div>
    <div class="resultTitle">結果</div>
    <div class="score">${correct} / ${total}</div>
    <div style="text-align:center;font-size:26px;font-weight:900">正解率 ${rate}%</div>
    <div class="judge">
      ${wrong.length?`<button class="tryBtn" data-action="try">TRY AGAIN (${wrong.length})</button>`:""}
      <button class="startBtn" style="font-size:26px;padding:15px 30px" data-action="restart">同じVolをもう一度</button>
      <button class="menuBtn" data-action="menu">トップに戻る</button>
    </div>
    <h2>間違えた単語一覧</h2>${miss}
  </div>`;
}

let tapLock=false;
function handleAction(e){
  const btn=e.target.closest&&e.target.closest("button[data-action]");
  if(!btn)return;

  e.preventDefault();
  e.stopPropagation();

  const a=btn.dataset.action;

  if(tapLock && (a==="ok" || a==="ng" || a==="answer")) return;
  if(a==="ok" || a==="ng" || a==="answer"){
    tapLock=true;
    setTimeout(function(){tapLock=false;},350);
  }

  if(a==="mode")changeMode(btn.dataset.mode);
  else if(a==="vol")selectVol(Number(btn.dataset.s),Number(btn.dataset.e));
  else if(a==="start")startGame();
  else if(a==="answer")showAnswer();
  else if(a==="ok")mark(true);
  else if(a==="ng")mark(false);
  else if(a==="speak"&&cards[index])speak(cards[index].word);
  else if(a==="speakword")speak(btn.dataset.word||"");
  else if(a==="next"){playClick();showQuestion()}
  else if(a==="try")startTryAgain();
  else if(a==="restart")startGame();
  else if(a==="menu")menu();
  else if(a==="reset")resetData();
}
let touchStartX=0;
let touchStartY=0;
let touchDidMove=false;
let suppressClickUntil=0;

document.addEventListener("touchstart",function(e){
  const t=e.touches&&e.touches[0];
  if(!t)return;
  touchStartX=t.clientX;
  touchStartY=t.clientY;
  touchDidMove=false;
},{passive:true,capture:true});

document.addEventListener("touchmove",function(e){
  const t=e.touches&&e.touches[0];
  if(!t)return;
  if(Math.abs(t.clientX-touchStartX)>8||Math.abs(t.clientY-touchStartY)>8){
    touchDidMove=true;
  }
},{passive:true,capture:true});

document.addEventListener("touchend",function(e){
  if(touchDidMove){
    suppressClickUntil=Date.now()+500;
    return;
  }
  const btn=e.target.closest&&e.target.closest("button[data-action]");
  if(!btn)return;
  suppressClickUntil=Date.now()+500;
  handleAction(e);
},{passive:false,capture:true});

document.addEventListener("click",function(e){
  if(Date.now()<suppressClickUntil){
    e.preventDefault();
    e.stopPropagation();
    return;
  }
  handleAction(e);
},true);

document.addEventListener("keydown",e=>{if(e.key==="Enter"&&cards.length)showAnswer();});
menu();
loadCloudStats();
</script>
</body>
</html>
